<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Calendar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .wrap { width: 100%; max-width: 420px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  h1 i { color: #5344C0; }
  p { font-size: 14px; color: #888; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 14px; border: 0.5px solid #e0e0e0; padding: 1.25rem 1.5rem; margin-bottom: 12px; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 14px; transition: box-shadow 0.15s, transform 0.15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; flex-shrink: 0; }
  .card-text { flex: 1; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .card-sub { font-size: 13px; color: #aaa; }
  .card-arrow { font-size: 18px; color: #ccc; }
</style>
</head>
<body>
<div class="wrap">
  <h1><i class="ti ti-calendar-event"></i> Video Calendar</h1>
  <p>Select which account group to open</p>

  <a class="card" href="video-calendar.html">
    <div class="card-icon" style="background:#E8534A"><i class="ti ti-brand-instagram"></i></div>
    <div class="card-text">
      <div class="card-title">Restaurants 1 – 3</div>
      <div class="card-sub">video-calendar.html</div>
    </div>
    <i class="ti ti-chevron-right card-arrow"></i>
  </a>

  <a class="card" href="video-calendar-2.html">
    <div class="card-icon" style="background:#5344C0"><i class="ti ti-brand-instagram"></i></div>
    <div class="card-text">
      <div class="card-title">Restaurants 4 – 6</div>
      <div class="card-sub">video-calendar-2.html</div>
    </div>
    <i class="ti ti-chevron-right card-arrow"></i>
  </a>
</div>
</body>
</html>
