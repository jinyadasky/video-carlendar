<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Calendar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 i { color: #5344C0; font-size: 22px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .nav-btn {
    background: #fff;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    color: #1a1a1a;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: #f0f0ee; }
  .month-title { font-size: 20px; font-weight: 500; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }
  .weekday {
    text-align: center;
    font-size: 12px;
    color: #999;
    padding: 4px 0;
    letter-spacing: 0.05em;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border: 0.5px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    background: #fff;
    transition: border-color 0.15s;
  }
  .day-cell:hover { border-color: #aaa; }
  .day-cell.empty { border: none; background: none; cursor: default; }
  .day-cell.today { border: 1.5px solid #5344C0; }
  .day-cell.has-video { background: #f7f6ff; }

  .day-number {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
    z-index: 2;
    line-height: 1;
  }
  .day-cell.today .day-number { color: #5344C0; }

  .thumb-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
  }
  .thumb-img {
    width: 100%;
    height: 70%;
    object-fit: cover;
    display: block;
  }
  .thumb-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.45) 100%);
  }
  .thumb-icon {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    background: rgba(255,255,255,0.92);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #333;
    z-index: 3;
  }
  .add-icon {
    position: absolute;
    bottom: 6px;
    right: 6px;
    font-size: 16px;
    color: #bbb;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    border: 0.5px solid #ddd;
    overflow: hidden;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid #eee;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 500; }
  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #888;
    font-size: 20px;
    line-height: 1;
    padding: 2px;
  }
  .close-btn:hover { color: #333; }
  .modal-body { padding: 1.25rem; }

  .video-preview {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1rem;
    position: relative;
  }
  .video-preview iframe { width: 100%; height: 100%; border: none; }
  .preview-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.25);
    cursor: pointer;
    transition: background 0.15s;
  }
  .play-overlay:hover { background: rgba(0,0,0,0.4); }
  .play-btn-big {
    width: 56px;
    height: 56px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #333;
  }
  .no-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #666;
    font-size: 14px;
    position: absolute;
    inset: 0;
  }

  .field-label {
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    display: block;
  }
  .field-group { margin-bottom: 1rem; }
  input[type=text], textarea {
    width: 100%;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type=text]:focus, textarea:focus {
    border-color: #5344C0;
    box-shadow: 0 0 0 3px rgba(83,74,192,0.12);
  }
  textarea { resize: vertical; min-height: 72px; }

  .modal-footer {
    padding: 1rem 1.25rem;
    border-top: 0.5px solid #eee;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
  }
  .btn-primary {
    background: #5344C0;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #4338a8; }
  .btn-secondary {
    background: none;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    color: #1a1a1a;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: #f5f5f3; }
  .btn-danger {
    background: none;
    border: 0.5px solid #eee;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    color: #c0392b;
    margin-right: auto;
    transition: background 0.15s;
  }
  .btn-danger:hover { background: #fff5f5; }

  .view-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .view-title { font-size: 15px; font-weight: 500; }
  .edit-link {
    font-size: 13px;
    color: #5344C0;
    cursor: pointer;
    background: none;
    border: none;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .caption-display {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .thumb-preview-wrap {
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: #000;
    margin-bottom: 1rem;
  }
  .thumb-preview-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  @media (max-width: 600px) {
    .page { padding: 1rem; }
    .day-number { font-size: 11px; top: 4px; left: 5px; }
    .add-icon { font-size: 13px; bottom: 4px; right: 4px; }
    .thumb-icon { width: 18px; height: 18px; font-size: 9px; bottom: 4px; right: 4px; }
  }
</style>
</head>
<body>
<div class="page">
  <h1><i class="ti ti-calendar-event"></i> Video Calendar</h1>

  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i> Prev</button>
    <span class="month-title" id="month-title"></span>
    <button class="nav-btn" onclick="changeMonth(1)">Next <i class="ti ti-chevron-right"></i></button>
  </div>

  <div class="weekdays">
    <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
    <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
  </div>

  <div class="calendar-grid" id="calendar-grid"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-box"></div>
</div>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();
  let curYear = now.getFullYear();
  let curMonth = now.getMonth();
  let videos = JSON.parse(localStorage.getItem('video-calendar') || '{}');

  function save() {
    localStorage.setItem('video-calendar', JSON.stringify(videos));
  }

  function key(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function changeMonth(dir) {
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0) { curMonth = 11; curYear--; }
    render();
  }

  function getYoutubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&?\/\s]{11})/);
    return m ? m[1] : null;
  }

  function getVimeoId(url) {
    if (!url) return null;
    const m = url.match(/vimeo\.com\/(\d+)/);
    return m ? m[1] : null;
  }

  function getThumbUrl(url) {
    const yt = getYoutubeId(url);
    if (yt) return `https://img.youtube.com/vi/${yt}/mqdefault.jpg`;
    return null;
  }

  function render() {
    document.getElementById('month-title').textContent = `${MONTHS[curMonth]} ${curYear}`;
    const grid = document.getElementById('calendar-grid');
    const firstDay = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    const isCurrentMonth = curYear === now.getFullYear() && curMonth === now.getMonth();

    let html = '';
    for (let i = 0; i < firstDay; i++) html += `<div class="day-cell empty"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const k = key(curYear, curMonth, d);
      const v = videos[k];
      const isToday = isCurrentMonth && d === now.getDate();
      let cellClass = 'day-cell' + (isToday ? ' today' : '') + (v ? ' has-video' : '');
      const thumb = v ? getThumbUrl(v.url) : null;

      html += `<div class="${cellClass}" onclick="openDay('${k}',${d})" title="${v ? (v.title || 'Video') : 'Add video'}">`;
      html += `<span class="day-number">${d}</span>`;
      if (v && thumb) {
        html += `<div class="thumb-wrap"><img class="thumb-img" src="${thumb}" alt="" onerror="this.style.display='none'"><div class="thumb-fade"></div></div>`;
        html += `<div class="thumb-icon"><i class="ti ti-player-play"></i></div>`;
      } else if (v) {
        html += `<div class="thumb-icon"><i class="ti ti-video"></i></div>`;
      } else {
        html += `<div class="add-icon"><i class="ti ti-plus"></i></div>`;
      }
      html += `</div>`;
    }
    grid.innerHTML = html;
  }

  function openDay(k, d) {
    const v = videos[k];
    if (v) showView(k, d, v);
    else showEdit(k, d);
  }

  function showView(k, d, v) {
    const [y, m] = k.split('-');
    const dateLabel = `${MONTHS[parseInt(m)-1]} ${d}, ${y}`;
    const thumb = getThumbUrl(v.url);

    document.getElementById('modal-box').innerHTML = `
      <div class="modal-header">
        <span class="modal-title">${dateLabel}</span>
        <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="video-preview">
          ${thumb ? `<img class="preview-thumb" src="${thumb}" alt="Video thumbnail">` : `<div class="no-thumb-placeholder"><i class="ti ti-video" style="font-size:36px;color:#888"></i><span style="font-size:13px;color:#888">Click to watch</span></div>`}
          <div class="play-overlay" onclick="playVideo('${k}',${d})" title="Open video">
            <div class="play-btn-big"><i class="ti ti-player-play"></i></div>
          </div>
        </div>
        <div class="view-header">
          <span class="view-title">${v.title || 'Untitled video'}</span>
          <button class="edit-link" onclick="showEdit('${k}',${d})"><i class="ti ti-edit"></i> Edit</button>
        </div>
        ${v.caption ? `<p class="caption-display">${v.caption}</p>` : ''}
        <p style="font-size:12px;color:#aaa;word-break:break-all">${v.url}</p>
      </div>`;
    document.getElementById('modal').style.display = 'flex';
  }

  function playVideo(k, d) {
    const v = videos[k];
    window.open(v.url, '_blank');
  }

  function showEdit(k, d) {
    const [y, m] = k.split('-');
    const dateLabel = `${MONTHS[parseInt(m)-1]} ${d}, ${y}`;
    const v = videos[k] || {};
    const thumb = v.url ? getThumbUrl(v.url) : null;

    document.getElementById('modal-box').innerHTML = `
      <div class="modal-header">
        <span class="modal-title">${dateLabel}</span>
        <button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Video URL <span style="color:#bbb">(YouTube or Vimeo)</span></label>
          <input type="text" id="inp-url" placeholder="https://youtube.com/watch?v=..." value="${v.url || ''}" oninput="previewThumb()">
        </div>
        <div id="thumb-preview" style="display:${thumb ? 'block' : 'none'}">
          <div class="thumb-preview-wrap"><img id="thumb-img-preview" src="${thumb || ''}" alt="Preview" onerror="document.getElementById('thumb-preview').style.display='none'"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Title</label>
          <input type="text" id="inp-title" placeholder="Video title..." value="${v.title || ''}">
        </div>
        <div class="field-group">
          <label class="field-label">Caption</label>
          <textarea id="inp-caption" placeholder="Add a note or description...">${v.caption || ''}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        ${v.url ? `<button class="btn-danger" onclick="deleteVideo('${k}')"><i class="ti ti-trash" style="font-size:14px"></i> Remove</button>` : ''}
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveVideo('${k}')">Save</button>
      </div>`;
    document.getElementById('modal').style.display = 'flex';
  }

  function previewThumb() {
    const url = document.getElementById('inp-url').value;
    const thumb = getThumbUrl(url);
    const wrap = document.getElementById('thumb-preview');
    const img = document.getElementById('thumb-img-preview');
    if (thumb && wrap && img) {
      img.src = thumb;
      wrap.style.display = 'block';
    } else if (wrap) {
      wrap.style.display = 'none';
    }
  }

  function saveVideo(k) {
    const url = document.getElementById('inp-url').value.trim();
    const title = document.getElementById('inp-title').value.trim();
    const caption = document.getElementById('inp-caption').value.trim();
    if (!url) { closeModal(); return; }
    videos[k] = { url, title, caption };
    save();
    closeModal();
    render();
  }

  function deleteVideo(k) {
    delete videos[k];
    save();
    closeModal();
    render();
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  render();
</script>
</body>
</html>
